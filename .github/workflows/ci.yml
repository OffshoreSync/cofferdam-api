name: CI

# Typecheck on every push to main + every PR. Deploy on tag push (v*).
# CLOUDFLARE_API_TOKEN must be set as a repository secret with
# Workers:Edit and Account:Read scopes (least-privilege).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck

  deploy:
    name: deploy (tag push)
    needs: typecheck
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Production environment gate — set required reviewers in
    # repository settings to require manual approval before deploy.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
